name: Update files.json

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  update-files-list:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate files.json
        run: |
          find . -type f \
            ! -path './.git/*' \
            ! -path './.github/*' \
            ! -name 'files.json' \
            ! -name '.gitignore' \
            | sed 's|^\./||' \
            | jq -R -s 'split("\n") | map(select(length > 0))' > files.json
      
      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add files.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update files.json" && git push)
