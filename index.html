<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Умный поиск по библиотеке</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .search-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 400px; text-align: center; }
        h2 { color: #333; margin-bottom: 20px; }
        input[type="text"], input[type="password"] { width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        input[type="text"]:focus, input[type="password"]:focus { border-color: #2ea44f; }
        button { background-color: #2ea44f; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-size: 16px; width: 100%; font-weight: bold; }
        button:hover { background-color: #2c974b; }
        .results { margin-top: 25px; text-align: left; max-height: 250px; overflow-y: auto; }
        .file-item { background: #f0f3f5; padding: 10px; margin-bottom: 8px; border-radius: 6px; border-left: 4px solid #2ea44f; font-size: 14px; color: #444; }
        .error { color: #cb2431; font-weight: bold; }
    </style>
</head>
<body>

<div class="search-container">
    <h2>🔎 Поиск GitHub Models</h2>
    <input type="password" id="tokenInput" placeholder="Вставьте ваш GitHub токен (github_pat_...)">
    <input type="text" id="queryInput" placeholder="Например: найди про животных...">
    <button onclick="startSearch()">Найти файлы</button>
    
    <div class="results" id="resultsBlock"></div>
</div>

<script>
// Загрузка списка файлов из локального файла (без CORS)
async function fetchRepositoryFiles() {
    try {
        const response = await fetch('files.json');  // лежит рядом с index.html
        if (!response.ok) throw new Error('Не удалось загрузить files.json');
        const fileList = await response.json();
        if (!Array.isArray(fileList)) throw new Error('files.json должен содержать массив строк');
        return fileList;
    } catch (e) {
        console.error("Ошибка при чтении списка файлов:", e);
        return [];  // вернём пустой массив – обработаем в UI
    }
}

async function startSearch() {
    const token = document.getElementById("tokenInput").value.trim();
    const query = document.getElementById("queryInput").value.trim();
    const resultsBlock = document.getElementById("resultsBlock");
    
    if (!token) {
        resultsBlock.innerHTML = "<div class='error'>Ошибка: Пожалуйста, введите ваш токен доступа!</div>";
        return;
    }
    if (!query) return;

    resultsBlock.innerHTML = "<em>Считываю список файлов...</em>";

    const myFilesList = await fetchRepositoryFiles();

    if (!myFilesList || myFilesList.length === 0) {
        resultsBlock.innerHTML = "<div class='error'>Ошибка: не удалось загрузить список файлов. Убедитесь, что рядом с index.html лежит файл files.json с корректным JSON-массивом.</div>";
        return;
    }

    resultsBlock.innerHTML = "<em>Думаю и ищу через ИИ...</em>";

    const systemPrompt = "Ты — файловый навигатор. Помоги пользователю найти нужные файлы. Ты видишь ТОЛЬКО список путей к файлам. Ориентируйся по названиям папок и расширениям файлов. Возвращай строго чистый JSON-массив строк (например, [\"папка/файл.txt\"]). Не пиши никаких приветствий или лишнего текста.";

    try {
        // Правильный URL GitHub Models
        const response = await fetch("https://models.inference.ai.azure.com/chat/completions", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify({
                model: "gpt-4o-mini",
                messages: [
                    { role: "system", content: systemPrompt },
                    { role: "user", content: `Список файлов проекта:\n${JSON.stringify(myFilesList)}\n\nЗапрос пользователя: "${query}"` }
                ],
                temperature: 0.1
            })
        });

        const data = await response.json();
        
        if (data.error) {
            resultsBlock.innerHTML = `<div class='error'>Ошибка ИИ: ${data.error.message}</div>`;
            return;
        }

        const textResult = data.choices[0].message.content.trim();
        let foundFiles;
        try {
            foundFiles = JSON.parse(textResult);
        } catch {
            // на случай, если модель вернула невалидный JSON
            resultsBlock.innerHTML = `<div class='error'>Модель вернула ответ не в формате JSON: ${textResult}</div>`;
            return;
        }

        resultsBlock.innerHTML = "";
        if (foundFiles.length === 0) {
            resultsBlock.innerHTML = "<div>Ничего не найдено 🤷‍♂️</div>";
        } else {
            foundFiles.forEach(file => {
                resultsBlock.innerHTML += `<div class='file-item'>📁 ${file}</div>`;
            });
        }
    } catch (error) {
        resultsBlock.innerHTML = "<div class='error'>Произошла техническая ошибка при поиске.</div>";
        console.error(error);
    }
}
</script>

</body>
</html>
