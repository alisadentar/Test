<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Умный поиск по библиотеке</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .search-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 450px; text-align: center; }
        h2 { color: #333; margin-bottom: 15px; }
        .setup-section { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 15px; font-size: 13px; }
        .setup-section a { color: #2ea44f; }
        input[type="text"], input[type="password"] { width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        input[type="text"]:focus, input[type="password"]:focus { border-color: #2ea44f; }
        button { background-color: #2ea44f; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-size: 16px; width: 100%; font-weight: bold; }
        button:hover { background-color: #2c974b; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        .results { margin-top: 25px; text-align: left; max-height: 350px; overflow-y: auto; }
        .file-item { background: #f0f3f5; padding: 10px; margin-bottom: 8px; border-radius: 6px; border-left: 4px solid #2ea44f; font-size: 14px; color: #444; transition: all 0.2s; }
        .file-item:hover { background: #e4f0e8; }
        .error { color: #cb2431; font-weight: bold; }
        .success { color: #2ea44f; font-weight: bold; font-size: 13px; }
        .loading { color: #666; }
        small { color: #666; display: block; margin-top: -10px; margin-bottom: 10px; }
        .badge { background: #2ea44f; color: white; padding: 2px 8px; border-radius: 10px; font-size: 12px; }
    </style>
</head>
<body>

<div class="search-container">
    <h2>🔎 Умный поиск с ИИ <span class="badge">Gemini</span></h2>
    
    <div class="setup-section" id="setupSection">
        <strong>🔑 Нужен API ключ Gemini (бесплатно)</strong><br>
        <a href="https://aistudio.google.com/apikey" target="_blank">Получить ключ</a> → скопировать → вставить ниже
    </div>
    
    <input type="password" id="apiKeyInput" placeholder="Вставьте Gemini API ключ (AIza...)">
    <small id="keyStatus"></small>
    
    <input type="text" id="queryInput" placeholder="Например: найди файлы с документацией..." disabled>
    <button onclick="startSearch()" id="searchBtn" disabled>🔍 Найти файлы</button>
    
    <div class="results" id="resultsBlock">
        <div class="loading">👆 Сначала вставьте API ключ</div>
    </div>
</div>

<script>
let allFiles = [];
let apiKey = '';

// Загружаем сохранённый ключ
const savedKey = localStorage.getItem('gemini_api_key');
if (savedKey) {
    apiKey = savedKey;
    document.getElementById("apiKeyInput").value = savedKey;
    document.getElementById("keyStatus").innerHTML = '<span class="success">✅ Ключ загружен</span>';
    document.getElementById("queryInput").disabled = false;
    document.getElementById("searchBtn").disabled = false;
    document.getElementById("setupSection").style.display = 'none';
    document.getElementById("resultsBlock").innerHTML = '<div class="loading">✅ Готово! Введите запрос для поиска</div>';
    loadFiles();
}

// Сохранение ключа при вводе
document.getElementById("apiKeyInput").addEventListener('input', function() {
    const key = this.value.trim();
    if (key.startsWith('AIza') && key.length > 30) {
        apiKey = key;
        localStorage.setItem('gemini_api_key', key);
        document.getElementById("keyStatus").innerHTML = '<span class="success">✅ Ключ сохранён</span>';
        document.getElementById("queryInput").disabled = false;
        document.getElementById("searchBtn").disabled = false;
        document.getElementById("setupSection").style.display = 'none';
        document.getElementById("resultsBlock").innerHTML = '<div class="loading">✅ Готово! Введите запрос для поиска</div>';
        loadFiles();
    } else if (key.length > 0) {
        document.getElementById("keyStatus").innerHTML = '<span class="error">❌ Ключ должен начинаться с AIza...</span>';
    }
});

// Загрузка списка файлов
function loadFiles() {
    fetch('files.json')
        .then(r => r.json())
        .then(files => {
            allFiles = files;
            console.log('📁 Загружено файлов:', files.length);
        })
        .catch(e => console.error('Ошибка files.json:', e));
}

// Основная функция поиска
async function startSearch() {
    const query = document.getElementById("queryInput").value.trim();
    const resultsBlock = document.getElementById("resultsBlock");
    const searchBtn = document.getElementById("searchBtn");
    
    if (!apiKey) {
        resultsBlock.innerHTML = "<div class='error'>❌ Сначала вставьте API ключ Gemini!</div>";
        return;
    }
    if (!query) {
        resultsBlock.innerHTML = "<div class='error'>❌ Введите поисковый запрос!</div>";
        return;
    }
    if (allFiles.length === 0) {
        resultsBlock.innerHTML = "<div class='error'>❌ Список файлов пуст. Проверьте files.json</div>";
        return;
    }

    resultsBlock.innerHTML = "<div class='loading'>🤖 ИИ анализирует файлы...</div>";
    searchBtn.disabled = true;

    try {
        const response = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`,
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    systemInstruction: {
                        parts: [{
                            text: "Ты — файловый навигатор. Найди файлы по запросу пользователя. Ответь ТОЛЬКО JSON-массивом строк с путями к файлам. Без markdown, без пояснений. Пример ответа: [\"папка/файл.txt\", \"другой/файл.js\"]"
                        }]
                    },
                    contents: [{
                        parts: [{
                            text: `Список всех файлов в проекте:\n${JSON.stringify(allFiles, null, 2)}\n\nЗапрос пользователя: "${query}"\n\nНайди подходящие файлы. Верни только JSON-массив.`
                        }]
                    }]
                })
            }
        );

        const data = await response.json();
        
        if (data.error) {
            resultsBlock.innerHTML = `<div class='error'>❌ Ошибка API: ${data.error.message}</div>`;
            return;
        }

        // Извлекаем ответ
        const textResult = data.candidates[0].content.parts[0].text.trim();
        
        // Пытаемся распарсить JSON
        let foundFiles = [];
        try {
            // Удаляем возможные markdown-обёртки ```json ... ```
            const cleanJson = textResult.replace(/```json|```/g, '').trim();
            foundFiles = JSON.parse(cleanJson);
        } catch(e) {
            console.error('Ошибка парсинга ответа:', textResult);
            resultsBlock.innerHTML = `<div class='error'>❌ ИИ вернул некорректный ответ. Попробуйте другой запрос.</div>`;
            return;
        }

        // Показываем результаты
        resultsBlock.innerHTML = "";
        if (!Array.isArray(foundFiles) || foundFiles.length === 0) {
            resultsBlock.innerHTML = "<div>🤷‍♂️ Ничего не найдено. Попробуйте уточнить запрос.</div>";
        } else {
            resultsBlock.innerHTML += `<div style="margin-bottom:10px;color:#666;">📊 Найдено: <strong>${foundFiles.length}</strong></div>`;
            foundFiles.forEach(file => {
                // Проверяем, существует ли файл в списке
                const exists = allFiles.some(f => f === file || f.includes(file));
                const icon = exists ? '📄' : '🤔';
                resultsBlock.innerHTML += `<div class='file-item'>${icon} ${file}</div>`;
            });
        }
    } catch (error) {
        resultsBlock.innerHTML = "<div class='error'>❌ Ошибка соединения. Проверьте интернет.</div>";
        console.error(error);
    } finally {
        searchBtn.disabled = false;
    }
}

// Поиск по Enter
document.getElementById("queryInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter") startSearch();
});
</script>

</body>
</html>
