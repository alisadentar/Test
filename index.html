<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Умный поиск по библиотеке</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .search-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 450px; text-align: center; }
        h2 { color: #333; margin-bottom: 15px; }
        .token-section { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 15px; font-size: 13px; }
        .token-section a { color: #2ea44f; }
        input[type="text"], input[type="password"] { width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        input[type="text"]:focus, input[type="password"]:focus { border-color: #2ea44f; }
        button { background-color: #2ea44f; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-size: 16px; width: 100%; font-weight: bold; }
        button:hover { background-color: #2c974b; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        .results { margin-top: 25px; text-align: left; max-height: 300px; overflow-y: auto; }
        .file-item { background: #f0f3f5; padding: 10px; margin-bottom: 8px; border-radius: 6px; border-left: 4px solid #2ea44f; font-size: 14px; color: #444; }
        .error { color: #cb2431; font-weight: bold; }
        .success { color: #2ea44f; font-weight: bold; font-size: 13px; }
        small { color: #666; display: block; margin-top: -10px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="search-container">
    <h2>🔎 Умный поиск с ИИ</h2>
    
    <div class="token-section">
        <strong>🔑 Нужен токен GitHub Models</strong><br>
        <a href="https://github.com/marketplace/models/azure-openai/gpt-4o-mini/playground" target="_blank">
            Открыть Playground
        </a> → F12 → Console → вставить код:
        <br><code style="background:#e9ecef;padding:2px 6px;border-radius:3px;font-size:12px;">copy(localStorage.getItem('gh_models_token'))</code>
        <br>и вставить токен ниже 👇
    </div>
    
    <input type="password" id="tokenInput" placeholder="Вставьте токен сюда">
    <small id="tokenStatus"></small>
    
    <input type="text" id="queryInput" placeholder="Например: найди файлы с документацией...">
    <button onclick="startSearch()" id="searchBtn">Найти файлы</button>
    
    <div class="results" id="resultsBlock"></div>
</div>

<script>
// Проверяем сохраненный токен
const savedToken = localStorage.getItem('gh_token');
if (savedToken) {
    document.getElementById("tokenInput").value = savedToken;
    document.getElementById("tokenStatus").innerHTML = '<span class="success">✅ Токен загружен из памяти браузера</span>';
}

// Автосохранение токена при вводе
document.getElementById("tokenInput").addEventListener('input', function() {
    const token = this.value.trim();
    if (token) {
        localStorage.setItem('gh_token', token);
        document.getElementById("tokenStatus").innerHTML = '<span class="success">✅ Токен сохранён</span>';
    }
});

let allFiles = [];

// Загрузка списка файлов
fetch('files.json')
    .then(r => r.json())
    .then(files => {
        allFiles = files;
        console.log('📁 Загружено файлов:', files.length);
    })
    .catch(e => console.error('Ошибка files.json:', e));

async function startSearch() {
    const token = document.getElementById("tokenInput").value.trim();
    const query = document.getElementById("queryInput").value.trim();
    const resultsBlock = document.getElementById("resultsBlock");
    const searchBtn = document.getElementById("searchBtn");
    
    if (!token) {
        resultsBlock.innerHTML = "<div class='error'>❌ Сначала вставьте токен!</div>";
        return;
    }
    if (!query) {
        resultsBlock.innerHTML = "<div class='error'>❌ Введите запрос!</div>";
        return;
    }

    resultsBlock.innerHTML = "<em>🤖 Ищу с помощью ИИ...</em>";
    searchBtn.disabled = true;

    try {
        const response = await fetch("https://models.inference.ai.azure.com/chat/completions", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify({
                model: "gpt-4o-mini",
                messages: [
                    { role: "system", content: "Ты — файловый навигатор. Возвращай ТОЛЬКО JSON-массив строк с путями к файлам без пояснений." },
                    { role: "user", content: `Файлы:\n${JSON.stringify(allFiles)}\n\nЗапрос: "${query}"` }
                ],
                temperature: 0.1
            })
        });

        const data = await response.json();
        
        if (data.error) {
            if (data.error.message.includes('Bad credentials') || data.error.message.includes('unauthorized')) {
                localStorage.removeItem('gh_token');
                document.getElementById("tokenStatus").innerHTML = '<span class="error">❌ Токен истёк. Получите новый!</span>';
                resultsBlock.innerHTML = "<div class='error'>🔑 Токен истёк или неверный. Получите новый в Playground.</div>";
            } else {
                resultsBlock.innerHTML = `<div class='error'>Ошибка: ${data.error.message}</div>`;
            }
            return;
        }

        const textResult = data.choices[0].message.content.trim();
        const foundFiles = JSON.parse(textResult);

        resultsBlock.innerHTML = "";
        if (foundFiles.length === 0) {
            resultsBlock.innerHTML = "<div>🤷‍♂️ Ничего не найдено</div>";
        } else {
            resultsBlock.innerHTML += `<div style="margin-bottom:10px;color:#666;">📊 Найдено: <strong>${foundFiles.length}</strong></div>`;
            foundFiles.forEach(file => {
                resultsBlock.innerHTML += `<div class='file-item'>📁 ${file}</div>`;
            });
        }
    } catch (error) {
        resultsBlock.innerHTML = "<div class='error'>❌ Ошибка соединения. Проверьте интернет.</div>";
        console.error(error);
    } finally {
        searchBtn.disabled = false;
    }
}
</script>

</body>
</html>
