<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Умный поиск по библиотеке</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .search-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 400px; text-align: center; }
        h2 { color: #333; margin-bottom: 20px; }
        input[type="text"] { width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        input[type="text"]:focus { border-color: #2ea44f; }
        button { background-color: #2ea44f; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-size: 16px; width: 100%; font-weight: bold; }
        button:hover { background-color: #2c974b; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        .results { margin-top: 25px; text-align: left; max-height: 300px; overflow-y: auto; }
        .file-item { background: #f0f3f5; padding: 10px; margin-bottom: 8px; border-radius: 6px; border-left: 4px solid #2ea44f; font-size: 14px; color: #444; }
        .error { color: #cb2431; font-weight: bold; }
        .login-btn { background-color: #24292e; margin-bottom: 15px; }
        .login-btn:hover { background-color: #1a1f23; }
    </style>
</head>
<body>

<div class="search-container">
    <h2>🔎 Умный поиск с ИИ</h2>
    <button class="login-btn" id="loginBtn" onclick="loginWithGithub()">🔑 Войти через GitHub</button>
    <input type="text" id="queryInput" placeholder="Например: найди файлы с документацией..." disabled>
    <button id="searchBtn" onclick="startSearch()" disabled>Найти файлы</button>
    
    <div class="results" id="resultsBlock"></div>
</div>

<script>
let githubToken = null;
let allFiles = [];

// Проверяем, есть ли токен в localStorage
const savedToken = localStorage.getItem('github_models_token');
if (savedToken) {
    githubToken = savedToken;
    document.getElementById("loginBtn").textContent = "✅ Вы авторизованы";
    document.getElementById("queryInput").disabled = false;
    document.getElementById("searchBtn").disabled = false;
    loadFiles();
}

// Функция для входа через GitHub OAuth
function loginWithGithub() {
    // Открываем страницу GitHub Models Playground для получения токена
    const authWindow = window.open('https://github.com/marketplace/models/azure-openai/gpt-4o-mini/playground', '_blank');
    
    // Инструкция для пользователя
    alert('В открывшемся окне:\n1. Нажмите F12 → Console\n2. Вставьте этот код и нажмите Enter:\n\ncopy(JSON.parse(document.getElementById("__NEXT_DATA__")?.textContent || "{}")?.props?.pageProps?.token || localStorage.getItem("gh_models_token"))\n\n3. Вернитесь сюда и вставьте скопированный токен');
    
    // Запрашиваем токен у пользователя
    const token = prompt('Вставьте скопированный токен из консоли GitHub Models Playground:');
    if (token && token.trim()) {
        githubToken = token.trim();
        localStorage.setItem('github_models_token', githubToken);
        document.getElementById("loginBtn").textContent = "✅ Вы авторизованы";
        document.getElementById("queryInput").disabled = false;
        document.getElementById("searchBtn").disabled = false;
        loadFiles();
    }
}

// Загрузка списка файлов
async function loadFiles() {
    try {
        const response = await fetch('files.json');
        if (response.ok) {
            allFiles = await response.json();
            console.log('Загружено файлов:', allFiles.length);
        }
    } catch (e) {
        console.error('Ошибка загрузки files.json:', e);
    }
}

// Основная функция поиска
async function startSearch() {
    const query = document.getElementById("queryInput").value.trim();
    const resultsBlock = document.getElementById("resultsBlock");
    
    if (!query) {
        resultsBlock.innerHTML = "<div class='error'>Введите поисковый запрос!</div>";
        return;
    }

    if (!githubToken) {
        resultsBlock.innerHTML = "<div class='error'>Сначала войдите через GitHub!</div>";
        return;
    }

    if (allFiles.length === 0) {
        resultsBlock.innerHTML = "<div class='error'>Список файлов пуст. Проверьте files.json</div>";
        return;
    }

    resultsBlock.innerHTML = "<em>🤖 Ищу с помощью ИИ...</em>";
    document.getElementById("searchBtn").disabled = true;

    try {
        const response = await fetch("https://models.inference.ai.azure.com/chat/completions", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + githubToken
            },
            body: JSON.stringify({
                model: "gpt-4o-mini",
                messages: [
                    { 
                        role: "system", 
                        content: "Ты — файловый навигатор. Возвращай ТОЛЬКО JSON-массив строк с путями к файлам. Без пояснений." 
                    },
                    { 
                        role: "user", 
                        content: `Файлы проекта:\n${JSON.stringify(allFiles)}\n\nЗапрос: "${query}"` 
                    }
                ],
                temperature: 0.1
            })
        });

        const data = await response.json();
        
        if (data.error) {
            if (data.error.message.includes('Bad credentials')) {
                localStorage.removeItem('github_models_token');
                resultsBlock.innerHTML = "<div class='error'>Токен истёк. Войдите заново.</div>";
                document.getElementById("loginBtn").textContent = "🔑 Войти через GitHub";
                document.getElementById("queryInput").disabled = true;
                githubToken = null;
                return;
            }
            resultsBlock.innerHTML = `<div class='error'>Ошибка: ${data.error.message}</div>`;
            return;
        }

        const textResult = data.choices[0].message.content.trim();
        const foundFiles = JSON.parse(textResult);

        resultsBlock.innerHTML = "";
        if (foundFiles.length === 0) {
            resultsBlock.innerHTML = "<div>🤷‍♂️ Ничего не найдено</div>";
        } else {
            foundFiles.forEach(file => {
                resultsBlock.innerHTML += `<div class='file-item'>📁 ${file}</div>`;
            });
        }
    } catch (error) {
        resultsBlock.innerHTML = "<div class='error'>Ошибка соединения с ИИ</div>";
        console.error(error);
    } finally {
        document.getElementById("searchBtn").disabled = false;
    }
}
</script>

</body>
</html>
