<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Умный поиск по библиотеке</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .search-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 400px; text-align: center; }
        h2 { color: #333; margin-bottom: 20px; }
        input[type="text"] { width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        input[type="text"]:focus { border-color: #2ea44f; }
        button { background-color: #2ea44f; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-size: 16px; width: 100%; font-weight: bold; }
        button:hover { background-color: #2c974b; }
        .results { margin-top: 25px; text-align: left; max-height: 250px; overflow-y: auto; }
        .file-item { background: #f0f3f5; padding: 10px; margin-bottom: 8px; border-radius: 6px; border-left: 4px solid #2ea44f; font-size: 14px; color: #444; }
        .error { color: #cb2431; font-weight: bold; }
    </style>
</head>
<body>

<div class="search-container">
    <h2>🔎 Поиск GitHub Models</h2>
    <input type="text" id="queryInput" placeholder="Например: найди про животных...">
    <button onclick="startSearch()">Найти файлы</button>
    
    <div class="results" id="resultsBlock"></div>
</div>

<script>
// =====================================================================
// НАСТРОЙКА №1: Вставьте ваш секретный токен (ключ) вместо текста ниже
// =====================================================================
const GITHUB_TOKEN = "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";

// =====================================================================
// НАСТРОЙКА №2: Введите ваше имя на GitHub и название вашей библиотеки
// =====================================================================
const GITHUB_USER = "alisadentar";     // Например: "alisadentar"
const REPO_NAME = "Test";    // Например: "Test"

// Функция, которая сама заходит в ваш репозиторий и скачивает список всех файлов
async function fetchRepositoryFiles() {
    const url = `https://github.com{GITHUB_USER}/${REPO_NAME}/git/trees/main?recursive=1`;
    try {
        const response = await fetch(url, {
            headers: { "Authorization": `Bearer ${GITHUB_TOKEN}` }
        });
        const data = await response.json();
        
        // Отбираем только файлы и убираем служебный index.html и системные настройки из поиска
        return data.tree
            .filter(item => item.type === "blob" && item.path !== "index.html" && !item.path.startsWith('.'))
            .map(item => item.path);
    } catch (e) {
        console.error("Не удалось считать файлы с GitHub:", e);
        return [];
    }
}

async function startSearch() {
    const query = document.getElementById("queryInput").value;
    const resultsBlock = document.getElementById("resultsBlock");
    
    if (!query.trim()) return;
    resultsBlock.innerHTML = "<em>Считываю файлы вашей библиотеки...</em>";

    // Автоматически получаем самый свежий список файлов
    const myFilesList = await fetchRepositoryFiles();

    if (myFilesList.length === 0) {
        resultsBlock.innerHTML = "<div class="error">Ошибка: не удалось прочитать файлы. Проверьте имя аккаунта и репозитория в коде.</div>";
        return;
    }

    resultsBlock.innerHTML = "<em>Думаю и ищу через ИИ...</em>";

    const systemPrompt = `Ты — файловый навигатор. Помоги пользователю найти нужные файлы. 
Ты видишь ТОЛЬКО список путей к файлам. Ориентируйся по названиям папок и расширениям файлов.
Возвращай строго чистый JSON-массив строк. Не пиши никаких приветствий или лишнего текста.`;

    try {
        // Запрос к GitHub Models
        const response = await fetch("https://azure.com", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${GITHUB_TOKEN}`
            },
            body: JSON.stringify({
                model: "gpt-4o-mini",
                messages: [
                    { role: "system", content: systemPrompt },
                    { role: "user", content: `Список файлов проекта:\n${JSON.stringify(myFilesList)}\n\nЗапрос пользователя: "${query}"` }
                ],
                temperature: 0.1
            })
        });

        const data = await response.json();
        const textResult = data.choices.message.content.trim();
        const foundFiles = JSON.parse(textResult);

        resultsBlock.innerHTML = "";
        if (foundFiles.length === 0) {
            resultsBlock.innerHTML = "<div>Ничего не найдено 🤷‍♂️</div>";
        } else {
            foundFiles.forEach(file => {
                resultsBlock.innerHTML += `<div class="file-item">📁 ${file}</div>`;
            });
        }
    } catch (error) {
        resultsBlock.innerHTML = `<div class="error">Произошла ошибка при поиске.</div>`;
        console.error(error);
    }
}
</script>

</body>
</html>
