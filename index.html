<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Умный поиск по библиотеке</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .search-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 400px; text-align: center; }
        h2 { color: #333; margin-bottom: 20px; }
        input[type="text"] { width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        input[type="text"]:focus { border-color: #2ea44f; }
        button { background-color: #2ea44f; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-size: 16px; width: 100%; font-weight: bold; }
        button:hover { background-color: #2c974b; }
        .results { margin-top: 25px; text-align: left; max-height: 250px; overflow-y: auto; }
        .file-item { background: #f0f3f5; padding: 10px; margin-bottom: 8px; border-radius: 6px; border-left: 4px solid #2ea44f; font-size: 14px; color: #444; }
        .error { color: #cb2431; font-weight: bold; }
    </style>
</head>
<body>

<div class="search-container">
    <h2>🔎 Поиск GitHub Models</h2>
    <input type="text" id="queryInput" placeholder="Например: найди про животных...">
    <button onclick="startSearch()">Найти файлы</button>
    
    <div class="results" id="resultsBlock"></div>
</div>

<script>
const GITHUB_TOKEN = "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";  // ← ВСТАВЬТЕ СЮДА ВАШ ТОКЕН

async function fetchRepositoryFiles() {
    try {
        const response = await fetch('files.json');
        if (!response.ok) throw new Error('files.json не найден');
        const fileList = await response.json();
        if (!Array.isArray(fileList)) throw new Error('Неверный формат JSON');
        return fileList;
    } catch (e) {
        console.error('Ошибка загрузки списка файлов:', e);
        return [];
    }
}

async function startSearch() {
    const query = document.getElementById("queryInput").value.trim();
    const resultsBlock = document.getElementById("resultsBlock");
    
    if (!query) {
        resultsBlock.innerHTML = "<div class='error'>Введите поисковый запрос!</div>";
        return;
    }

    resultsBlock.innerHTML = "<em>Загружаю список файлов...</em>";
    const myFilesList = await fetchRepositoryFiles();

    if (myFilesList.length === 0) {
        resultsBlock.innerHTML = "<div class='error'>Ошибка: не удалось загрузить список файлов.</div>";
        return;
    }

    resultsBlock.innerHTML = "<em>Ищу с помощью ИИ...</em>";

    try {
        const response = await fetch("https://models.inference.ai.azure.com/chat/completions", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + GITHUB_TOKEN
            },
            body: JSON.stringify({
                model: "gpt-4o-mini",
                messages: [
                    { 
                        role: "system", 
                        content: "Ты — файловый навигатор. Находи файлы по запросу пользователя. Возвращай ТОЛЬКО JSON-массив строк с путями к файлам. Без пояснений." 
                    },
                    { 
                        role: "user", 
                        content: `Файлы:\n${JSON.stringify(myFilesList)}\n\nЗапрос: "${query}"` 
                    }
                ],
                temperature: 0.1
            })
        });

        const data = await response.json();
        
        if (data.error) {
            resultsBlock.innerHTML = `<div class='error'>Ошибка API: ${data.error.message}</div>`;
            return;
        }

        const textResult = data.choices[0].message.content.trim();
        const foundFiles = JSON.parse(textResult);

        resultsBlock.innerHTML = "";
        if (foundFiles.length === 0) {
            resultsBlock.innerHTML = "<div>Ничего не найдено 🤷‍♂️</div>";
        } else {
            foundFiles.forEach(file => {
                resultsBlock.innerHTML += `<div class='file-item'>📁 ${file}</div>`;
            });
        }
    } catch (error) {
        resultsBlock.innerHTML = "<div class='error'>Ошибка при поиске. Проверьте токен и повторите.</div>";
        console.error(error);
    }
}
</script>

</body>
</html>
